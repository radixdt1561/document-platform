name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ── 1. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            pkg_manager: pnpm
          - service: document-service
            pkg_manager: npm

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        if: matrix.pkg_manager == 'pnpm'
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ matrix.pkg_manager }}
          cache-dependency-path: ${{ matrix.service }}/${{ matrix.pkg_manager == 'pnpm' && 'pnpm-lock.yaml' || 'package-lock.json' }}

      - name: Install (pnpm)
        if: matrix.pkg_manager == 'pnpm'
        run: pnpm install --frozen-lockfile
        working-directory: ${{ matrix.service }}

      - name: Install (npm)
        if: matrix.pkg_manager == 'npm'
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Unit tests
        run: ${{ matrix.pkg_manager }} run test:unit -- --ci --coverage
        working-directory: ${{ matrix.service }}
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret
          REFRESH_TOKEN_SECRET: test-refresh-secret

      - name: Integration tests
        run: ${{ matrix.pkg_manager }} run test:integration -- --ci
        working-directory: ${{ matrix.service }}
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret
          REFRESH_TOKEN_SECRET: test-refresh-secret

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage

  # ── 2. Security audit ────────────────────────────────────────────────────────
  audit:
    name: Dependency Audit — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { service: auth-service,      pkg_manager: pnpm }
          - { service: document-service,  pkg_manager: npm  }
          - { service: analytics-service, pkg_manager: npm  }
          - { service: user-service,      pkg_manager: npm  }
          - { service: worker-service,    pkg_manager: npm  }
          - { service: api-gateway,       pkg_manager: npm  }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        if: matrix.pkg_manager == 'pnpm'
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install (pnpm)
        if: matrix.pkg_manager == 'pnpm'
        run: pnpm install --frozen-lockfile
        working-directory: ${{ matrix.service }}
      - name: Install (npm)
        if: matrix.pkg_manager == 'npm'
        run: npm ci
        working-directory: ${{ matrix.service }}
      - name: Audit (pnpm)
        if: matrix.pkg_manager == 'pnpm'
        run: pnpm audit --audit-level high
        working-directory: ${{ matrix.service }}
      - name: Audit (npm)
        if: matrix.pkg_manager == 'npm'
        run: npm audit --audit-level=high
        working-directory: ${{ matrix.service }}

  # ── 3. Build Docker images ───────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test, audit]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [auth-service, document-service, analytics-service, user-service, worker-service, api-gateway]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ matrix.service }}:$IMAGE_TAG \
                       -t $ECR_REGISTRY/${{ matrix.service }}:latest \
                       ./${{ matrix.service }}
          docker push $ECR_REGISTRY/${{ matrix.service }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ matrix.service }}:latest

  # ── 4. Deploy to ECS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [auth-service, document-service, analytics-service, user-service, worker-service, api-gateway]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Force ECS redeploy
        run: |
          aws ecs update-service \
            --cluster document-platform \
            --service ${{ matrix.service }} \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text

      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster document-platform \
            --services ${{ matrix.service }}

  # ── 5. Load test (post-deploy, main only) ────────────────────────────────────
  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -y

      - name: Run load test
        run: k6 run document-service/tests/load.test.js
        env:
          BASE_URL: ${{ secrets.LOAD_TEST_BASE_URL }}
          TOKEN:    ${{ secrets.LOAD_TEST_TOKEN }}
